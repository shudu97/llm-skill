model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openai/your-enterprise-model-name   # replace with your model name
      api_base: os.environ/ENTERPRISE_GATEWAY_URL
      api_key: os.environ/ENTERPRISE_GATEWAY_KEY

litellm_settings:
  callbacks: ["src.utils.litellm_hooks.tool_id_remap_hook"]
  num_retries: 0

general_settings:
  otel: true
